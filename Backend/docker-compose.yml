version: "3.9"

# ═══════════════════════════════════════════════════════════════════
# VoiceCraft Platform — Docker Compose (Production-Ready)
# Services: api, celery-clone, celery-tts, celery-detect,
#           postgres, redis, minio, nginx
# ═══════════════════════════════════════════════════════════════════

x-api-environment: &api-env
  DATABASE_URL: postgresql+asyncpg://voicecraft:voicecraft_pass@postgres:5432/voicecraft
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: voicecraft_admin
  MINIO_SECRET_KEY: voicecraft_secret_CHANGE_ME
  MINIO_SECURE: "false"
  MINIO_BUCKET_VOICES: voice-profiles
  MINIO_BUCKET_AUDIO: generated-audio
  MINIO_BUCKET_UPLOADS: raw-uploads
  MINIO_BUCKET_MODELS: custom-models
  MODELS_DIR: /app/models_cache
  VOICE_PROFILES_DIR: /app/voice_profiles
  TEMP_AUDIO_DIR: /tmp/voicecraft_audio
  XTTS_DEVICE: "cpu"                   # Change to "cuda" with GPU deployment
  WHISPER_DEVICE: "cpu"                # Change to "cuda" with GPU deployment
  WHISPER_MODEL_SIZE: "base"
  DEBUG: "false"
  ENVIRONMENT: production
  METRICS_ENABLED: "true"
  JWT_SECRET: "CHANGE-THIS-SECRET-IN-PRODUCTION-MIN-32-CHARS"
  SECRET_KEY: "CHANGE-THIS-IN-PRODUCTION-TOO"
  ALLOWED_ORIGINS: "http://localhost:3000,https://your-domain.com"


x-gpu-deploy: &gpu-deploy
  resources:
    reservations:
      devices:
        - driver: nvidia
          count: 1
          capabilities: [gpu]


services:

  # ── FastAPI Application ──────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    image: voicecraft-api:latest
    container_name: voicecraft_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *api-env
      PRELOAD_MODELS: "false"
    volumes:
      - models_cache:/app/models_cache
      - voice_profiles:/app/voice_profiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - voicecraft_net
    # Uncomment for GPU:
    # deploy:
    #   <<: *gpu-deploy

  # ── Celery Worker: Voice Cloning ─────────────────────────────
  celery-clone:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    image: voicecraft-worker:latest
    container_name: voicecraft_celery_clone
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app worker
      --queues=clone,fine_tune
      --concurrency=1
      --loglevel=info
      --hostname=worker-clone@%h
    environment:
      <<: *api-env
    volumes:
      - models_cache:/app/models_cache
      - voice_profiles:/app/voice_profiles
    depends_on:
      - redis
      - postgres
      - minio
    networks:
      - voicecraft_net
    # Uncomment for GPU:
    # deploy:
    #   <<: *gpu-deploy

  # ── Celery Worker: TTS Synthesis ─────────────────────────────
  celery-tts:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    image: voicecraft-worker:latest
    container_name: voicecraft_celery_tts
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app worker
      --queues=tts
      --concurrency=2
      --loglevel=info
      --hostname=worker-tts@%h
    environment:
      <<: *api-env
    volumes:
      - models_cache:/app/models_cache
      - voice_profiles:/app/voice_profiles
    depends_on:
      - redis
      - postgres
      - minio
    networks:
      - voicecraft_net

  # ── Celery Worker: Deepfake Detection ────────────────────────
  celery-detect:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    image: voicecraft-worker:latest
    container_name: voicecraft_celery_detect
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app worker
      --queues=detect,maintenance
      --concurrency=2
      --loglevel=info
      --hostname=worker-detect@%h
    environment:
      <<: *api-env
    volumes:
      - models_cache:/app/models_cache
    depends_on:
      - redis
      - postgres
      - minio
    networks:
      - voicecraft_net

  # ── Celery Beat (Scheduled Tasks) ────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    image: voicecraft-worker:latest
    container_name: voicecraft_celery_beat
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler
    environment:
      <<: *api-env
    depends_on:
      - redis
    networks:
      - voicecraft_net

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: voicecraft_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: voicecraft
      POSTGRES_USER: voicecraft
      POSTGRES_PASSWORD: voicecraft_pass
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voicecraft -d voicecraft"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voicecraft_net

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: voicecraft_redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voicecraft_net

  # ── MinIO (S3-compatible, self-hosted, FREE) ─────────────────
  minio:
    image: minio/minio:latest
    container_name: voicecraft_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: voicecraft_admin
      MINIO_ROOT_PASSWORD: voicecraft_secret_CHANGE_ME
      MINIO_VOLUMES: /data
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Web console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - voicecraft_net

  # ── Nginx Reverse Proxy ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: voicecraft_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - voicecraft_net


volumes:
  postgres_data:
  redis_data:
  minio_data:
  models_cache:    # XTTS-v2, Whisper, detection model weights
  voice_profiles:  # local voice profile working files


networks:
  voicecraft_net:
    driver: bridge
