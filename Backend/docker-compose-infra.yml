# ═══════════════════════════════════════════════════════════════════
# VoiceCraft — Infrastructure Only (Postgres + Redis + MinIO)
# Run: docker compose -f docker-compose-infra.yml up -d
# ═══════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: voicecraft_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: voicecraft
      POSTGRES_USER: voicecraft
      POSTGRES_PASSWORD: voicecraft_pass
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voicecraft -d voicecraft"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: voicecraft_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ──────────────────────
  minio:
    image: minio/minio:latest
    container_name: voicecraft_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: voicecraft_admin
      MINIO_ROOT_PASSWORD: voicecraft_secret_CHANGE_ME
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
